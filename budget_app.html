<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ميزانيتي">
<title>ميزانيتي</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;min-height:100vh;padding-bottom:2rem}
.header{background:#2563eb;color:#fff;padding:1rem 1.2rem 1.4rem;position:sticky;top:0;z-index:10}
.header h1{font-size:18px;font-weight:500}
.header p{font-size:12px;opacity:.8;margin-top:2px}
.app{max-width:480px;margin:0 auto;padding:1rem}
.balance-card{background:#fff;border-radius:16px;padding:1.5rem;text-align:center;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.balance-label{font-size:13px;color:#64748b;margin-bottom:.4rem}
.balance-amount{font-size:38px;font-weight:600}
.balance-amount.positive{color:#16a34a}
.balance-amount.negative{color:#dc2626}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
.stat-card{background:#fff;border-radius:12px;padding:1rem;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stat-label{font-size:12px;color:#64748b;margin-bottom:.3rem}
.stat-value{font-size:20px;font-weight:600}
.stat-value.income{color:#16a34a}
.stat-value.expense{color:#dc2626}
.input-group{background:#fff;border-radius:16px;padding:1.2rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.8rem}
.type-btn{padding:.6rem;border-radius:10px;border:1.5px solid #e2e8f0;background:#f8fafc;color:#64748b;font-size:14px;cursor:pointer;font-family:inherit;transition:.15s}
.type-btn.active.income{background:#dcfce7;border-color:#16a34a;color:#15803d;font-weight:500}
.type-btn.active.expense{background:#fee2e2;border-color:#dc2626;color:#b91c1c;font-weight:500}
.inp{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:.7rem 1rem;font-size:15px;color:#0f172a;outline:none;font-family:inherit;transition:.15s}
.inp:focus{border-color:#2563eb;background:#fff}
.inp-full{margin-bottom:.6rem}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.6rem}
.add-btn{width:100%;padding:.8rem;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;transition:.15s}
.add-btn:active{background:#1d4ed8}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.section-title{font-size:15px;font-weight:500;color:#0f172a}
.filter-tabs{display:flex;gap:.4rem}
.ftab{padding:.3rem .7rem;border-radius:8px;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;font-size:12px;cursor:pointer;font-family:inherit}
.ftab.active{background:#2563eb;border-color:#2563eb;color:#fff}
.txn-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem}
.txn-item{background:#fff;border-radius:12px;padding:.85rem 1rem;display:flex;align-items:center;gap:.75rem;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.txn-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.txn-icon.income{background:#dcfce7}
.txn-icon.expense{background:#fee2e2}
.txn-info{flex:1;min-width:0}
.txn-name{font-size:14px;font-weight:500;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-date{font-size:11px;color:#94a3b8;margin-top:2px}
.txn-amount{font-size:15px;font-weight:600;white-space:nowrap}
.txn-amount.income{color:#16a34a}
.txn-amount.expense{color:#dc2626}
.txn-del{background:none;border:none;cursor:pointer;color:#cbd5e1;padding:4px;font-size:18px;line-height:1}
.txn-del:active{color:#dc2626}
.empty-state{text-align:center;padding:2.5rem;color:#94a3b8;font-size:14px;background:#fff;border-radius:12px}
.clear-btn{width:100%;padding:.6rem;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;color:#94a3b8;font-size:13px;cursor:pointer;font-family:inherit}
.clear-btn:active{border-color:#dc2626;color:#dc2626}
.install-hint{background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:.9rem 1rem;margin-bottom:1rem;font-size:13px;color:#1e40af;line-height:1.6}
.install-hint strong{display:block;margin-bottom:.3rem;font-size:14px}
.dismiss-btn{background:none;border:none;color:#60a5fa;font-size:12px;cursor:pointer;margin-top:.4rem;font-family:inherit;padding:0}
</style>
</head>
<body>

<div class="header">
  <h1><i class="ti ti-wallet"></i> ميزانيتي</h1>
  <p>تتبع دخلك ومصاريفك بسهولة</p>
</div>

<div class="app">

  <div class="install-hint" id="installHint">
    <strong>📲 أضفه لشاشتك الرئيسية</strong>
    افتح القائمة في المتصفح ← "إضافة إلى الشاشة الرئيسية" — يشتغل مثل تطبيق!
    <br><button class="dismiss-btn" onclick="document.getElementById('installHint').style.display='none'">إخفاء هذه الرسالة</button>
  </div>

  <div class="balance-card">
    <div class="balance-label">الرصيد الحالي</div>
    <div class="balance-amount" id="balanceAmt">0.00 د.إ</div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">إجمالي الدخل</div>
      <div class="stat-value income" id="totalIncome">0.00 د.إ</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">إجمالي المصاريف</div>
      <div class="stat-value expense" id="totalExpense">0.00 د.إ</div>
    </div>
  </div>

  <div class="input-group">
    <div class="type-toggle">
      <button class="type-btn active income" id="btnIncome" onclick="setType('income')">
        <i class="ti ti-arrow-down-circle"></i> دخل
      </button>
      <button class="type-btn expense" id="btnExpense" onclick="setType('expense')">
        <i class="ti ti-arrow-up-circle"></i> مصروف
      </button>
    </div>
    <input class="inp inp-full" id="inpDesc" placeholder="الوصف (مثلاً: راتب، إيجار...)" />
    <div class="input-row">
      <input class="inp" id="inpAmt" type="number" placeholder="المبلغ (د.إ)" min="0" inputmode="decimal" />
      <input class="inp" id="inpCat" placeholder="التصنيف" />
    </div>
    <button class="add-btn" onclick="addTxn()">
      <i class="ti ti-plus"></i> إضافة
    </button>
  </div>

  <div class="section-header">
    <div class="section-title">السجل</div>
    <div class="filter-tabs">
      <button class="ftab active" onclick="setFilter('all',this)">الكل</button>
      <button class="ftab" onclick="setFilter('income',this)">دخل</button>
      <button class="ftab" onclick="setFilter('expense',this)">مصاريف</button>
    </div>
  </div>

  <div class="txn-list" id="txnList"></div>
  <button class="clear-btn" onclick="clearAll()"><i class="ti ti-trash"></i> مسح الكل</button>

</div>

<script>
let txns = JSON.parse(localStorage.getItem('mybudget_txns')||'[]');
let currentType = 'income';
let currentFilter = 'all';

function save(){localStorage.setItem('mybudget_txns',JSON.stringify(txns))}

function setType(t){
  currentType=t;
  document.getElementById('btnIncome').className='type-btn'+(t==='income'?' active income':'');
  document.getElementById('btnExpense').className='type-btn'+(t==='expense'?' active expense':'');
}

function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function addTxn(){
  const desc=document.getElementById('inpDesc').value.trim();
  const amt=parseFloat(document.getElementById('inpAmt').value);
  const cat=document.getElementById('inpCat').value.trim()||'عام';
  if(!desc||!amt||amt<=0){
    const el=document.getElementById('inpDesc');
    el.style.borderColor='#dc2626';
    setTimeout(()=>el.style.borderColor='',1500);
    return;
  }
  txns.unshift({id:Date.now(),type:currentType,desc,amt,cat,date:new Date().toLocaleDateString('ar-AE')});
  save();
  document.getElementById('inpDesc').value='';
  document.getElementById('inpAmt').value='';
  document.getElementById('inpCat').value='';
  render();
}

function delTxn(id){
  txns=txns.filter(t=>t.id!==id);
  save();render();
}

function clearAll(){
  if(confirm('هل أنت متأكد من مسح كل السجلات؟')){txns=[];save();render();}
}

function fmt(n){return n.toLocaleString('ar-AE',{minimumFractionDigits:2,maximumFractionDigits:2})+' د.إ'}

function render(){
  const income=txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amt,0);
  const expense=txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amt,0);
  const bal=income-expense;
  const balEl=document.getElementById('balanceAmt');
  balEl.textContent=fmt(bal);
  balEl.className='balance-amount '+(bal>=0?'positive':'negative');
  document.getElementById('totalIncome').textContent=fmt(income);
  document.getElementById('totalExpense').textContent=fmt(expense);
  const filtered=currentFilter==='all'?txns:txns.filter(t=>t.type===currentFilter);
  const list=document.getElementById('txnList');
  if(!filtered.length){
    list.innerHTML='<div class="empty-state"><i class="ti ti-inbox" style="font-size:40px;display:block;margin-bottom:.5rem"></i>لا يوجد سجلات بعد<br>أضف أول عملية!</div>';
    return;
  }
  list.innerHTML=filtered.map(t=>`
    <div class="txn-item">
      <div class="txn-icon ${t.type}">
        ${t.type==='income'?'<i class="ti ti-arrow-down" style="color:#16a34a"></i>':'<i class="ti ti-arrow-up" style="color:#dc2626"></i>'}
      </div>
      <div class="txn-info">
        <div class="txn-name">${t.desc}</div>
        <div class="txn-date">${t.cat} · ${t.date}</div>
      </div>
      <div class="txn-amount ${t.type}">${t.type==='expense'?'−':'+'} ${fmt(t.amt)}</div>
      <button class="txn-del" onclick="delTxn(${t.id})" aria-label="حذف"><i class="ti ti-x"></i></button>
    </div>
  `).join('');
}

render();
</script>
</body>
</html>
